apiVersion: v1
kind: ServiceAccount
metadata:
  name: clawpatrol-gateway
  namespace: clawpatrol
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: clawpatrol-tokenreview
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: clawpatrol-tokenreview
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: clawpatrol-tokenreview
subjects:
  - kind: ServiceAccount
    name: clawpatrol-gateway
    namespace: clawpatrol
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: clawpatrol-pod-reader
  namespace: agents
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: clawpatrol-pod-reader
  namespace: agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: clawpatrol-pod-reader
subjects:
  - kind: ServiceAccount
    name: clawpatrol-gateway
    namespace: clawpatrol
