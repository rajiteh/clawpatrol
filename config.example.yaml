listen: ":443"
info_listen: ":8080"      # serves /ca.crt + /info for `clawall login`
ca_dir: "./ca"
log_path: "/var/log/clawall-gateway.log"

# Built-in integrations. Each name pulls in default OAuth + rules.
# Available: claude-max, openai, anthropic, github, openrouter, gemini, notion
integrations:
  - claude-max

# Optional: override / add OAuth providers. Same id wins over default.
# oauth:
#   - id: claude-max
#     oauth:
#       refresh_token: "{{secret:CLAUDE_MAX_REFRESH}}"
#   - id: my-custom
#     header: "Authorization"
#     prefix: "Bearer "
#     oauth:
#       client_id: "..."
#       auth_url:  "https://provider.example/oauth/authorize"
#       token_url: "https://provider.example/oauth/token"
#       scopes:    ["read", "write"]
#       refresh_token: "{{secret:CUSTOM_REFRESH}}"

# Optional: extra rules beyond the integration defaults.
# rules:
#   - host: api.example.com
#     swap:
#       - placeholder: "CLW_EXAMPLE"
#         secret: "{{secret:EXAMPLE_API_KEY}}"

# Optional: WebSocket payload scan-replace.
# rules:
#   - host: gateway.discord.gg
#     ws_scan: true
#     swap:
#       - placeholder: "CLW_DISCORD"
#         secret: "{{secret:DISCORD_TOKEN}}"

# Optional: bind via embedded Tailscale (tsnet). Leave empty to plain net.Listen.
# tailscale:
#   authkey: ""
#   control_url: ""    # for Headscale or custom
#   hostname: "clawall"
#   state_dir: "./ts-state"
